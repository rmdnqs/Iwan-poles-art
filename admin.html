<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS Admin Dasbor - Iwan Poles Art</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-slate-900 min-h-screen text-slate-100 p-6 md:p-12">

    <div class="max-w-4xl mx-auto space-y-12">
        
        <!-- FORM INPUT LUKISAN BARU -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl">
            <!-- Header CMS -->
            <div class="flex justify-between items-center mb-8 pb-4 border-b border-slate-700">
                <div>
                    <h1 class="text-2xl font-bold text-white">CMS Iwan Poles Art</h1>
                    <p class="text-slate-400 text-sm">Input lukisan baru ke dalam katalog web</p>
                </div>
                <a href="index.html" class="bg-slate-700 hover:bg-slate-600 text-white text-xs font-semibold px-4 py-2 rounded-xl transition-all">
                    Lihat Web Utama ➡️
                </a>
            </div>

            <!-- Form Input -->
            <form id="form-cms" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Judul Lukisan</label>
                    <input type="text" id="input-judul" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500" placeholder="Contoh: Logika Semesta">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">Harga (Angka Otomatis Titik)</label>
                        <input type="text" id="input-harga" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500" placeholder="Contoh: 5.500.000">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">Ukuran</label>
                        <input type="text" id="input-ukuran" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500" placeholder="Contoh: 100 x 100 cm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">Media & Bahan</label>
                        <input type="text" id="input-media" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500" placeholder="Contoh: Cat Akrilik di atas Kanvas">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-300 mb-2">Status Karya</label>
                        <select id="input-status" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
                            <option value="Tersedia">Tersedia</option>
                            <option value="Terjual">Terjual</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Warna Background Kartu (Gradasi Tailwind)</label>
                    <select id="input-gradient" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-amber-500">
                        <option value="from-blue-600 to-indigo-900">Biru Tua Mendalam</option>
                        <option value="from-cyan-600 to-blue-800">Cyan Samudra</option>
                        <option value="from-amber-600 to-red-800">Merah Fajar Warm</option>
                        <option value="from-emerald-600 to-teal-900">Hijau Emerald</option>
                        <option value="from-purple-600 to-fuchsia-900">Ungu Magis</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-300 mb-2">Deskripsi Lukisan</label>
                    <textarea id="input-deskripsi" rows="3" required class="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white focus:outline-none focus:border-amber-500" placeholder="Ceritakan makna atau emosi di balik lukisan ini..."></textarea>
                </div>

                <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold py-4 rounded-xl transition-all shadow-lg shadow-amber-500/20 cursor-pointer">
                    Simpan & Publikasikan Karya
                </button>
            </form>
        </div>

        <!-- TABEL DAFTAR MANAJEMEN LUKISAN -->
        <div class="bg-slate-800 border border-slate-700 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-xl font-bold text-white mb-2">Manajemen Koleksi Lukisan</h2>
            <p class="text-slate-400 text-sm mb-6">Kelola karya yang sudah di-input (Ubah status terjual atau hapus data)</p>
            
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm border-collapse">
                    <thead>
                        <tr class="border-b border-slate-700 text-slate-400 uppercase text-xs tracking-wider">
                            <th class="py-3 px-4">Lukisan</th>
                            <th class="py-3 px-4">Harga</th>
                            <th class="py-3 px-4">Status</th>
                            <th class="py-3 px-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tabel-koleksi" class="divide-y divide-slate-700/50">
                        <!-- Data digambar dinamis oleh JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- LOGIKA INTERNALS SCRIPT CMS -->
    <script>
        const form = document.getElementById("form-cms");
        const inputHarga = document.getElementById("input-harga");
        const tabelKoleksi = document.getElementById("tabel-koleksi");

        // 0. Fungsi Separator Angka Rupiah Otomatis Pas Diketik Admin
        inputHarga.addEventListener("input", function () {
            let nilai = this.value.replace(/[^0-9]/g, "");
            this.value = nilai ? new Intl.NumberFormat("id-ID").format(nilai) : "";
        });

        // 1. Fungsi Menampilkan Data Lukisan ke Tabel Manajemen
        function muatTabelManajemen() {
            let databaseLokal = JSON.parse(localStorage.getItem("database_lukisan")) || [];
            let listBaris = "";

            if (databaseLokal.length === 0) {
                tabelKoleksi.innerHTML = `<tr><td colspan="4" class="text-center py-8 text-slate-500 italic">Belum ada lukisan di database CMS lokal. Silakan tambah di atas.</td></tr>`;
                return;
            }

            databaseLokal.forEach((lukisan) => {
                // Formatter Rupiah Sederhana untuk tabel
                let hargaFormatted = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(lukisan.harga);
                
                listBaris += `
                    <tr class="hover:bg-slate-750/50 transition-colors">
                        <td class="py-4 px-4">
                            <div class="font-bold text-white">${lukisan.judul}</div>
                            <div class="text-xs text-slate-400 mt-0.5">${lukisan.ukuran} | ${lukisan.media}</div>
                        </td>
                        <td class="py-4 px-4 text-slate-300">${hargaFormatted}</td>
                        <td class="py-4 px-4">
                            <span class="text-xs font-semibold px-2.5 py-1 rounded-full ${lukisan.status === 'Tersedia' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}">
                                ${lukisan.status}
                            </span>
                        </td>
                        <td class="py-4 px-4">
                            <div class="flex justify-center gap-2">
                                <button onclick="toggleStatus(${lukisan.id})" class="text-xs bg-slate-700 hover:bg-amber-500 hover:text-slate-900 font-semibold px-3 py-1.5 rounded-lg transition-all cursor-pointer">
                                    🔄 Ubah Status
                                </button>
                                <button onclick="hapusLukisan(${lukisan.id}, '${lukisan.judul}')" class="text-xs bg-red-950 text-red-400 hover:bg-red-500 hover:text-white font-semibold px-3 py-1.5 rounded-lg transition-all cursor-pointer">
                                    🗑️ Hapus
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
            });

            tabelKoleksi.innerHTML = listBaris;
        }

        // 2. Proses Tambah Data Lukisan Baru via Form
        form.addEventListener("submit", function(e) {
            e.preventDefault(); 

            const lukisanBaru = {
                id: Date.now(), // ID Unik berbasis waktu milidetik
                judul: document.getElementById("input-judul").value,
                harga: inputHarga.value.replace(/\./g, ""), // Bersihkan titik sebelum disimpan
                ukuran: document.getElementById("input-ukuran").value,
                media: document.getElementById("input-media").value,
                status: document.getElementById("input-status").value,
                deskripsi: document.getElementById("input-deskripsi").value,
                gradient: document.getElementById("input-gradient").value
            };

            let databaseLokal = JSON.parse(localStorage.getItem("database_lukisan")) || [];
            databaseLokal.push(lukisanBaru);
            localStorage.setItem("database_lukisan", JSON.stringify(databaseLokal));

            alert(`Sukses! Lukisan "${lukisanBaru.judul}" berhasil dipublikasikan.`);
            form.reset();
            
            // Refresh tabel manajemen setelah data bertambah
            muatTabelManajemen();
        });

        // 3. Fitur Sakti: Ubah Status (Tersedia <=> Terjual)
        function toggleStatus(idLukisan) {
            let databaseLokal = JSON.parse(localStorage.getItem("database_lukisan")) || [];
            
            // Cari lukisan berdasarkan ID-nya, lalu ganti statusnya secara bergantian
            databaseLokal = databaseLokal.map(lukisan => {
                if (lukisan.id === idLukisan) {
                    lukisan.status = lukisan.status === "Tersedia" ? "Terjual" : "Tersedia";
                }
                return lukisan;
            });

            localStorage.setItem("database_lukisan", JSON.stringify(databaseLokal));
            muatTabelManajemen(); // gambar ulang tabel biar statusnya berubah langsung
        }

        // 4. Fitur Sakti: Hapus Lukisan Permanen dari Database Lokal
        function hapusLukisan(idLukisan, judulLukisan) {
            // Konfirmasi pengamanan agar tidak sengaja kepencet hapus
            if (confirm(`Apakah Anda yakin ingin menghapus lukisan "${judulLukisan}" secara permanen?`)) {
                let databaseLokal = JSON.parse(localStorage.getItem("database_lukisan")) || [];
                
                // Saring array: Ambil semua data KECUALI lukisan yang mau kita hapus
                databaseLokal = databaseLokal.filter(lukisan => lukisan.id !== idLukisan);
                
                localStorage.setItem("database_lukisan", JSON.stringify(databaseLokal));
                muatTabelManajemen(); // gambar ulang tabel
            }
        }

        // Jalankan pemuatan tabel manajemen pertama kali halaman admin dibuka
        muatTabelManajemen();
    </script>
</body>
</html>

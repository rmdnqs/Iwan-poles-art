<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iwan Poles Art Galeri</title>
    <!-- Kita panggil Tailwind CSS via CDN biar webnya langsung auto-ganteng -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md text-center">
        <h1 id="judul-toko" class="text-3xl font-bold text-gray-800 mb-4 transition-all duration-500">
            Iwan Poles Art Galeri
        </h1>
        
        <p class="text-gray-600 mb-6">
            Platform eksklusif penyedia lukisan siap beli dengan kualitas polesan maha karya terbaik.
        </p>

        <button id="tombol-beli" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-xl shadow-md transform active:scale-95 transition-all">
            Beli Sekarang
        </button>
    </div>

    <!-- SCRIPT JAVASCRIPT KITA -->
    <script>
        const tombol = document.getElementById("tombol-beli");
        const judul = document.getElementById("judul-toko");

        tombol.addEventListener("click", function() {
            alert("Terima kasih! Pesanan lukisan Anda sedang diproses oleh sistem.");
            judul.className = "text-3xl font-bold text-amber-500 mb-4 transition-all duration-500";
        });
    </script>

</body>
</html>

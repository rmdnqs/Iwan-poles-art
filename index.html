<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Lukisan Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body id="body-klien" class="bg-slate-950 text-slate-100 min-h-screen transition-all duration-500">

    <header class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center gap-4 border-b border-white/5">
        <div class="flex items-center gap-4">
            <img id="client-logo" src="https://placehold.co/100" alt="Logo Galeri" class="h-12 w-auto object-contain rounded-lg">
            <div>
                <h1 id="client-nama-galeri" class="text-2xl font-black tracking-tight text-white uppercase">Loading Galeri...</h1>
                <p id="client-deskripsi-hero" class="text-xs text-slate-400 max-w-md">Memuat narasi kurasi seni...</p>
            </div>
        </div>
        
        <div class="w-full md:w-auto">
            <input type="text" id="search-katalog" oninput="filterSemuaKonten()" placeholder="Cari judul lukisan..." class="w-full md:w-64 bg-white/5 border border-white/10 rounded-xl px-4 py-2 text-sm text-white focus:outline-none focus:border-amber-500">
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-6 pt-6 flex flex-wrap gap-2 text-xs">
        <button onclick="gantiKategoriFilter('Semua')" class="filter-btn px-4 py-2 bg-amber-500 text-slate-950 font-bold rounded-full transition-all">Semua</button>
        <button onclick="gantiKategoriFilter('Abstrak')" class="filter-btn px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all">Abstrak</button>
        <button onclick="gantiKategoriFilter('Realisme')" class="filter-btn px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all">Realisme</button>
        <button onclick="gantiKategoriFilter('Lanskap')" class="filter-btn px-4 py-2 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all">Lanskap</button>
    </div>

    <main class="max-w-7xl mx-auto px-6 py-8 space-y-12">
        <section id="seksi-featured" class="space-y-6">
            <div class="flex items-center gap-3">
                <span class="h-2 w-2 bg-amber-500 rounded-full animate-ping"></span>
                <h2 class="text-lg font-bold uppercase tracking-widest text-amber-500">Koleksi Mahakarya Unggulan</h2>
            </div>
            <div id="grid-featured" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </section>

        <section class="space-y-6 pt-6 border-t border-white/5">
            <h2 class="text-lg font-bold uppercase tracking-widest text-slate-400">Arsip Eksplorasi Katalog Komplit</h2>
            <div id="grid-archive" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script>
        const dbCloud = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);
        let masterDataLukisan = [];
        let kategoriAktif = "Semua";

        function formatRupiah(angka) {
            return 'Rp ' + parseFloat(angka).toLocaleString('id-ID');
        }

        async function initAplikasiKlien() {
            try {
                let { data: config } = await dbCloud.from('konfigurasi_web').select('*').eq('id', 1).single();
                if (config) {
                    document.getElementById("client-logo").src = config.logo_url || "https://placehold.co/100";
                    document.getElementById("client-nama-galeri").innerText = config.nama_galeri || "GALERI SENI";
                    document.getElementById("client-deskripsi-hero").innerText = config.deskripsi_hero || "";
                    document.getElementById("body-klien").style.backgroundColor = config.warna_bg_utama;
                }

                let { data: dataDb } = await dbCloud.from('lukisan').select('*').order('created_at', { ascending: false });
                masterDataLukisan = dataDb || [];
                filterSemuaKonten();
            } catch (err) { console.error(err.message); }
        }

        function gantiKategoriFilter(kat) {
            kategoriAktif = kat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-amber-500', 'text-slate-950', 'font-bold');
                btn.classList.add('bg-white/5', 'border', 'border-white/10', 'text-slate-100');
                if(btn.innerText === kat) {
                    btn.classList.add('bg-amber-500', 'text-slate-950', 'font-bold');
                    btn.classList.remove('bg-white/5', 'border', 'border-white/10', 'text-slate-100');
                }
            });
            filterSemuaKonten();
        }

        function filterSemuaKonten() {
            const kataKunci = document.getElementById("search-katalog").value.toLowerCase();
            const wadahFeatured = document.getElementById("grid-featured");
            const wadahArchive = document.getElementById("grid-archive");
            
            wadahFeatured.innerHTML = "";
            wadahArchive.innerHTML = "";

            masterDataLukisan.forEach(lukisan => {
                const cocokKategori = (kategoriAktif === "Semua" || lukisan.kategori === kategoriAktif);
                const cocokSearch = lukisan.judul.toLowerCase().includes(kataKunci);

                if (cocokKategori && cocokSearch) {
                    const urlGambarAset = lukisan.media || 'https://placehold.co/600x400?text=No+Image';
                    
                    // BARU: LINK WHATSAPP FITUR YANG SEBELUMNYA HILANG
                    const nomorWA = "6281234567890"; // Ganti dengan nomor WA lu cs
                    const teksWA = encodeURIComponent(`Halo, saya tertarik dengan lukisan "${lukisan.judul}" seharga ${formatRupiah(lukisan.harga)}. Apakah masih tersedia?`);
                    const linkOrderWA = `https://wa.me/${nomorWA}?text=${teksWA}`;

                    const htmlKartu = `
                        <div class="group bg-slate-900/50 border border-white/5 rounded-2xl overflow-hidden hover:border-amber-500/30 transition-all duration-300 relative flex flex-col justify-between">
                            <div class="absolute inset-0 bg-gradient-to-b ${lukisan.gradient || 'from-amber-500/10 to-transparent'} opacity-40 pointer-events-none"></div>
                            <div>
                                <div class="relative overflow-hidden aspect-[4/3] bg-black/40">
                                    <img src="${urlGambarAset}" alt="${lukisan.judul}" class="w-full h-full object-cover group-hover:scale-105 transition-all duration-500">
                                    <span class="absolute top-3 right-3 text-[10px] uppercase font-mono font-bold px-2 py-1 rounded border ${lukisan.status === 'Tersedia' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}">
                                        ${lukisan.status}
                                    </span>
                                </div>
                                <div class="p-5 space-y-2 relative z-10">
                                    <div class="flex justify-between items-start gap-2">
                                        <h3 class="font-bold text-white text-base group-hover:text-amber-400 transition-colors">${lukisan.judul}</h3>
                                        <span class="text-[10px] text-slate-400 bg-white/5 border border-white/10 px-2 py-0.5 rounded-full">${lukisan.kategori || 'Seni'}</span>
                                    </div>
                                    <p class="text-xs text-slate-400 line-clamp-2 font-light">${lukisan.deskripsi || 'Tidak ada deskripsi.'}</p>
                                </div>
                            </div>
                            <div class="p-5 pt-0 mt-4 space-y-3 relative z-10">
                                <div class="border-t border-white/5 pt-3 flex justify-between items-center bg-slate-900/40">
                                    <div>
                                        <span class="block text-[10px] uppercase tracking-wider text-slate-500">Dimensi</span>
                                        <span class="text-xs text-slate-300 font-mono">${lukisan.ukuran}</span>
                                    </div>
                                    <div class="text-right">
                                        <span class="block text-[10px] uppercase tracking-wider text-amber-500/70">Harga</span>
                                        <span class="text-sm font-black text-white font-mono">${formatRupiah(lukisan.harga)}</span>
                                    </div>
                                </div>
                                <a href="${linkOrderWA}" target="_blank" class="block w-full text-center bg-white/5 hover:bg-amber-500 hover:text-slate-950 border border-white/10 text-xs font-bold py-2 rounded-xl transition-all uppercase tracking-wider">
                                    Hubungi Kolektor (Order)
                                </a>
                            </div>
                        </div>
                    `;

                    if (lukisan.is_featured === true) wadahFeatured.insertAdjacentHTML('beforeend', htmlKartu);
                    if (lukisan.is_archive === true) wadahArchive.insertAdjacentHTML('beforeend', htmlKartu);
                }
            });

            // Sembunyikan heading featured kalau pencarian sedang aktif agar layout rapi
            document.getElementById("seksi-featured").style.display = kataKunci !== "" ? "none" : "block";
        }

        window.addEventListener("DOMContentLoaded", initAplikasiKlien);
    </script>
</body>
</html>
